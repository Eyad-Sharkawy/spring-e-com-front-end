<div class="line-item flex gap-5 py-6 border-b border-hairline" data-price="420" data-qty="1">
  @if (item().productImageUrl) {
    <div class="w-24 h-24 rounded-lg shrink-0 overflow-hidden">
      <img [src]="item().productImageUrl" [alt]="item().productName" class="object-cover w-full h-full" />
    </div>
  } @else {
    <div class="w-24 h-24 rounded-lg shrink-0 flex items-center justify-center"
         style="background:linear-gradient(160deg,#C9B79A,#8F7A57)">
      <svg viewBox="0 0 24 24" fill="none" class="w-8 h-8 text-bone/60" stroke="currentColor" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="m2.25 15.75 5.159-5.159a2.25 2.25 0 0 1 3.182 0l5.159 5.159m-1.5-1.5 1.409-1.409a2.25 2.25 0 0 1 3.182 0l2.909 2.909m-18 3.75h16.5a1.5 1.5 0 0 0 1.5-1.5V6a1.5 1.5 0 0 0-1.5-1.5H3.75A1.5 1.5 0 0 0 2.25 6v12a1.5 1.5 0 0 0 1.5 1.5Zm10.5-11.25h.008v.008h-.008V8.25Zm.375 0a.375 0 1 1-.75 0 .375 0 0 1 .75 0Z" />
      </svg>
    </div>
  }

  <div class="flex-1 min-w-0 flex flex-col sm:flex-row sm:items-start justify-between gap-3">
    <div class="min-w-0">
      <a [routerLink]="['/product', productId()]" class="font-medium mb-1 hover:underline block truncate">{{ item().productName }}</a>
      <p class="font-mono text-xs text-ink/50 mb-1 truncate">Seller: {{ item().productSeller }}</p>
      <p class="font-mono text-sm font-semibold mt-1 text-ink">{{ item().subTotal | currency : "EGP" : "symbol-narrow" }}</p>
    </div>

    <div class="flex flex-col items-end gap-2">
      <div class="flex items-center border border-hairline rounded-full overflow-hidden shrink-0">
        <button class="qty-btn w-8 h-8 font-mono" [disabled]="!canDecreaseQuantity()" (click)="decrementQuantity()">−
        </button>
        <span class="w-8 text-center font-mono text-xs qty-val">{{ itemQuantity() }}</span>
        <button class="qty-btn w-8 h-8 font-mono" [disabled]="!canIncreaseQuantity()" (click)="incrementQuantity()">+
        </button>
      </div>

      <button
        class="remove-link hover:text-red-400 hover:underline font-mono text-[11px] uppercase tracking-wide text-ink/50"
        (click)="remove()"
      >
        Remove
      </button>
    </div>
  </div>
</div>
