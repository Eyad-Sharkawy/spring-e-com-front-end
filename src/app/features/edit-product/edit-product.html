<ec-loading-spinner [isLoading]="isLoading()" />

@if (error(); as errorMessage) {
  <ec-error [errorMessage]="errorMessage" />
} @else if (product(); as item) {
  <div class="max-w-5xl mx-auto">
    <a [routerLink]="['/product', item.id]"
       class="font-mono text-xs uppercase tracking-wide text-ink/50 hover:text-ink">←
      Back to piece</a>
  </div>

  <header class="max-w-5xl mx-auto pt-4 pb-8 flex items-start justify-between gap-4">
    <div>
      <p class="font-mono text-xs uppercase tracking-[0.2em] text-clay mb-2">Editing</p>
      <h1 class="font-display text-4xl tracking-tight">{{ item.name }}</h1>
    </div>
    <button
      (click)="deleteProduct()"
      class="font-mono text-xs uppercase tracking-wide text-red-500 hover:text-red-600 border border-red-200 hover:border-red-300 rounded-full px-4 py-2 mt-4 cursor-pointer"
    >
      Delete piece
    </button>
  </header>

  <ec-add-product-form
    (submittedProduct)="handleProductSubmission($event)"
    [initialProduct]="item"
    submitLabel="Save changes"
  />

  @if (showDeleteModal()) {
    <div class="fixed inset-0 z-50 flex items-center justify-center bg-ink/40 backdrop-blur-sm">
      <div
        class="bg-bone border border-hairline rounded-2xl max-w-sm w-full p-6 shadow-xl mx-4 animate-in fade-in zoom-in-95 duration-200">
        <h2 class="font-display text-xl font-semibold mb-3">Delete this piece?</h2>
        <p class="text-xs text-ink/65 leading-relaxed mb-6 font-mono">
          This action cannot be undone. Are you sure you want to permanently delete "{{ item.name }}"?
        </p>
        <div class="flex gap-3 justify-end">
          <button
            (click)="closeDeleteModal()"
            class="font-mono text-xs uppercase tracking-wide text-ink/50 hover:text-ink px-4 py-2 border border-hairline rounded-full cursor-pointer transition-colors"
            type="button"
          >
            Cancel
          </button>
          <button
            (click)="confirmDelete()"
            class="font-mono text-xs uppercase tracking-wide text-bone bg-red-500 hover:bg-red-600 px-4 py-2 rounded-full cursor-pointer transition-colors"
            type="button"
          >
            Delete
          </button>
        </div>
      </div>
    </div>
  }
}
