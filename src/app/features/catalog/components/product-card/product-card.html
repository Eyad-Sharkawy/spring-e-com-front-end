<div class="relative max-w-75 mx-auto">
  <a [routerLink]="['/product', product().id]">
    <div class="relative rounded-xl aspect-square overflow-hidden mb-4">
      @if (product().imageUrl) {
        <img [alt]="product().name" [ngSrc]="product().imageUrl!" class="card-img object-cover" fill />
      } @else {
        <div class="card-img w-full h-full flex items-center justify-center"
             style="background:linear-gradient(160deg,#C9B79A,#8F7A57)">
          <svg class="w-8 h-8 text-bone/60" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
            <path d="m2.25 15.75 5.159-5.159a2.25 2.25 0 0 1 3.182 0l5.159 5.159m-1.5-1.5 1.409-1.409a2.25 2.25 0 0 1 3.182 0l2.909 2.909m-18 3.75h16.5a1.5 1.5 0 0 0 1.5-1.5V6a1.5 1.5 0 0 0-1.5-1.5H3.75A1.5 1.5 0 0 0 2.25 6v12a1.5 1.5 0 0 0 1.5 1.5Zm10.5-11.25h.008v.008h-.008V8.25Zm.375 0a.375 0 1 1-.75 0 .375 0 0 1 .75 0Z" stroke-linecap="round"
                  stroke-linejoin="round" />
          </svg>
        </div>
      }
      <span
        class="absolute top-3 left-3 font-mono text-[10px] uppercase bg-bone/90 px-2 py-1 rounded-full">{{ product().stock }}</span>
    </div>
    <div class="flex flex-col justify-between items-start min-w-0 w-full">
      <h3 class="font-medium truncate w-full">{{ product().name }}</h3>
      <div class="min-w-0 mt-1">
        <p class="font-mono text-xs text-ink/50 truncate">
          Seller: {{ product().seller }}
        </p>
        <p class="font-mono text-sm font-semibold my-1">
          {{ product().price | currency: "EGP" : "symbol-narrow" }}
        </p>
        <p class="font-mono text-xs text-ink/50 flex items-center gap-1.5">
          <span [class]="isInStock() ? 'bg-lime-500' : 'bg-ink'"
                class="stock-dot"></span> {{ isInStock() ? "in" : "Out of" }} stock
        </p>
      </div>
    </div>
  </a>
  <a
    (click)="$event.stopPropagation()"
    [routerLink]="['/product', product().id, 'edit']"
    aria-label="Edit product"
    class="absolute top-3 right-3 bg-bone/90 rounded-full p-1 hover:bg-bone transition-colors"
  >
    <svg class="w-3.5 h-3.5 text-ink" fill="none" viewBox="0 0 16 16">
      <path d="M11 2L14 5L5.5 13.5L2 14L2.5 10.5L11 2Z" stroke="currentColor" stroke-linejoin="round"
            stroke-width="1.3" />
    </svg>
  </a>
</div>
