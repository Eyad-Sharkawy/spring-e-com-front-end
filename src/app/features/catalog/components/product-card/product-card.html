<a [routerLink]="['/product', product().id]">
  <div class="relative rounded-xl max-w-75 max-h-75 mx-auto overflow-hidden mb-4">
    <div class="card-img" style="background:linear-gradient(160deg,#C9B79A,#8F7A57)"></div>
    <span
      class="absolute top-3 left-3 font-mono text-[10px] uppercase bg-bone/90 px-2 py-1 rounded-full">{{ product().stock }}</span>
  </div>

  <div class="flex flex-col justify-between items-start">
    <h3 class="font-medium">{{ product().name }}</h3>

    <div class="w-full flex justify-between">

      <div>
        <p class="font-mono text-xs text-ink/50 flex">
          Seller: {{ product().seller }}
        </p>
        <p class="font-mono text-xs text-ink/50 flex items-center gap-1.5">
          <span [class]="isInStock() ? 'bg-lime-500' : 'bg-ink'"
                class="stock-dot"></span> {{ isInStock() ? "in" : "Out of" }} stock
        </p>
      </div>

      <div>
        <p class="font-mono text-sm">{{ product().price | currency: "EGP" : "symbol-narrow" }}</p>
      </div>
    </div>
  </div>
</a>
