<header class="mx-auto flex flex-wrap items-end justify-between gap-4">
  <div>
    <p class="font-mono text-xs uppercase tracking-[0.2em] text-clay mb-2">Full catalog · {{ numberOfProducts() }}
      pieces</p>
    <h1 class="font-display text-4xl md:text-5xl tracking-tight">Every piece still on the shelf.</h1>
  </div>

  <div class="flex flex-col gap-1.5">
    <label class="font-mono text-[10px] uppercase tracking-wide text-ink/50" for="sort">Sort by</label>
    <div class="relative">
      <select
        (change)="onSortChange($any($event.target).value)"
        [value]="activeSort()"
        class="appearance-none border border-hairline rounded-full pl-4 pr-10 py-2.5 text-sm font-mono bg-transparent
               cursor-pointer transition-colors hover:border-ink/40 focus:outline-none focus:border-clay
               focus:ring-1 focus:ring-clay"
        id="sort"
      >
        @for (option of sortOptions; track option.value) {
          <option [selected]="option.value === activeSort()" [value]="option.value"
                  class="bg-bone text-ink">{{ option.label }}
          </option>
        }
      </select>

      <svg
        class="pointer-events-none absolute right-3.5 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-ink/50"
        fill="none" viewBox="0 0 12 8"
      >
        <path d="M1 1.5L6 6.5L11 1.5" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"
              stroke-width="1.5" />
      </svg>
    </div>
  </div>
</header>
