<header
  class="max-w-7xl mx-auto px-6 md:px-10 py-6 flex items-center justify-between border-b border-hairline relative">
  <a class="flex items-center gap-2.5" routerLink="/">
    <img alt="" class="w-7 h-7 shrink-0" height="28" ngSrc="favicon.svg" width="28" />
    <span class="font-display text-xl tracking-tight">Spring E-com</span>
  </a>

  <nav class="hidden md:flex gap-8 text-sm font-mono uppercase tracking-wide text-ink/70">
    <a class="hover:text-ink" routerLink="/catalog" routerLinkActive="text-ink">Shop</a>
    <a class="hover:text-ink" routerLink="/cart" routerLinkActive="text-ink">Cart</a>
    <a class="hover:text-ink" routerLink="/add-product" routerLinkActive="text-ink">Add Product</a>
  </nav>

  <div class="flex items-center gap-3">
    <a class="glaze-btn border border-hairline text-sm font-mono px-4 py-2 rounded-full" routerLink="/cart">Cart
      ({{ itemsCount() }})</a>

    <button
      (click)="toggleMobileMenu()"
      [attr.aria-expanded]="isMobileMenuOpen()"
      aria-label="Toggle navigation menu"
      class="md:hidden w-9 h-9 flex items-center justify-center border border-hairline rounded-full"
      type="button"
    >
      @if (isMobileMenuOpen()) {
        <span class="text-lg leading-none">✕</span>
      } @else {
        <span class="text-lg leading-none">☰</span>
      }
    </button>
  </div>

  @if (isMobileMenuOpen()) {
    <nav
      class="md:hidden absolute top-full left-0 right-0 bg-white border-b border-hairline flex flex-col text-sm font-mono uppercase tracking-wide text-ink/70 z-50"
    >
      <a (click)="closeMobileMenu()" class="px-6 py-4 border-b border-hairline hover:text-ink" routerLink="/catalog"
         routerLinkActive="text-ink">Shop</a>
      <a (click)="closeMobileMenu()" class="px-6 py-4 border-b border-hairline hover:text-ink" routerLink="/cart"
         routerLinkActive="text-ink">Cart</a>
      <a (click)="closeMobileMenu()" class="px-6 py-4 hover:text-ink" routerLink="/add-product"
         routerLinkActive="text-ink">Add Product</a>
    </nav>
  }
</header>
